name: Deploy Frontend to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push Frontend to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_FRONTEND_SPACE_NAME: ${{ secrets.HF_FRONTEND_SPACE_NAME }}
        run: |
          # Configure git
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          # Clone the Hugging Face Space repo
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_FRONTEND_SPACE_NAME hf-space

          # Copy frontend files to the cloned repo
          cd hf-space

          # Remove old files (except .git)
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Copy all frontend files
          cp -r ../frontend/* .
          cp ../frontend/.dockerignore . 2>/dev/null || true
          cp ../frontend/.gitignore . 2>/dev/null || true

          # Add all files and commit
          git add .
          git commit -m "Deploy frontend from GitHub Actions" || echo "No changes to commit"

          # Push to Hugging Face
          git push origin main
